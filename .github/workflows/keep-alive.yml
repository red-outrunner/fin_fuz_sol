name: Keep Backend Alive

on:
  schedule:
    # JSE trading hours: 08:00-17:30 SAST (UTC+2)
    # SAST 08:00 = UTC 06:00 | SAST 17:30 = UTC 15:30
    # Run every 5 min, Mon-Fri, 06:00-15:59 UTC (covers 08:00-17:59 SAST)
    # Weekly usage: 9.5 hrs/day × 5 days = 47.5 hrs (well under 750 hr free tier)
    - cron: "*/5 6-15 * * 1-5"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -f https://fin-fuz-sol.onrender.com/health || true
