name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # matches render.yaml PYTHON_VERSION
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps. httpx is pinned <0.28 for Starlette 0.35's TestClient.
          pip install pytest "httpx<0.28"

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./_ci.db"
          SECRET_KEY: "ci-secret-key"
          ENVIRONMENT: "test"
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"       # matches netlify.toml NODE_VERSION
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
