services:
  - type: web
    name: fin-fuz-sol-backend
    runtime: python
    # repo/branch are inferred from the connected repository when you deploy this
    # Blueprint from the Render dashboard. Add an explicit `repo:` URL only if you
    # want to pin a different source.
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true # Render will auto-generate a secure secret
      - key: ENVIRONMENT
        value: production # Makes a missing SECRET_KEY a hard startup failure
      - key: ALLOWED_ORIGINS
        sync: false # Comma-separated frontend origins, e.g. https://your-app.netlify.app
      - key: PYTHON_VERSION
        value: 3.11
