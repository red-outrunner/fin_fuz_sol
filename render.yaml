services:
  - type: web
    name: fin-fuz-sol-backend
    runtime: python
    repo: https://github.com/YOUR_USERNAME/fin_fuz_sol # Update with your GitHub repo
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true # Render will auto-generate a secure secret
      - key: PYTHON_VERSION
        value: 3.11
